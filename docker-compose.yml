# Docker Compose para HomeServer - Configurações otimizadas e atualizadas
# Feito por: Guilherme Souza

# -- SERVIÇOS INCLUÍDOS:
# - Homarr
# - Portainer
# - Uptime Kuma
# - Nginx Proxy Manager 
# - FileBrowser
# - Gitea
# - Pihole 
# - Wireguard

# -- CONFIGURAÇÕES PADRONIZADAS:
# - Rede virtual: homeserver (bridge) com ipam
# - Logging: json-file com rotação de logs (max-size: 50MB, max-file: 5)
# - Restart: unless-stopped para todos os serviços
# - Limites de memória e CPU configurados para cada serviço

# ---- CONFIGURAÇÃO REUTILIZADA ----
networks:
  homeserver:
    name: homeserver
    driver: bridge
    ipam:
      config:
        - subnet: ${INTERNAL_SUBNET}

x-defaults: &defaults
  restart: unless-stopped

  networks:
    - homeserver      

  logging:
    driver: "json-file"
    options:
      max-size: "50MB"
      max-file: "5"
  
  # security_opt: 
  #   - no-new-privileges:true

  # init: true

# ---- SERVIÇOS ----
services:
# HOMARR
  homarr:
    <<: *defaults
    image: ghcr.io/homarr-labs/homarr:v1.54.0
    container_name: homarr

    ports:
      - "${HOMARR_PORT}:7575"

    environment:
      TZ: ${TZ}
      SECRET_ENCRYPTION_KEY: ${HOMARR_SECRET_ENCRYPTION_KEY}
      PUID: ${HOMARR_PUID}
      PGID: ${HOMARR_PGID}

    volumes:
      - ./data/homarr:/appdata

    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${HOMARR_IP}

# PORTAINER
  portainer:
    <<: *defaults
    image: portainer/portainer-ce:2.38.1-linux-amd64-alpine
    container_name: portainer
    
    ports:
      - "${PORTAINER_PORT}:9000"

    environment:
      TZ: ${TZ}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    
    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${PORTAINER_IP}

# UPTIME-KUMA
  uptime-kuma:
    <<: *defaults
    image: louislam/uptime-kuma:2-slim
    container_name: uptime-kuma

    ports:
      - "${UPTIMEKUMA_PORT}:3001"

    environment:
      TZ: ${TZ}

    volumes:
      - ./data/uptime-kuma:/app/data
    
    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${UPTIME_KUMA_IP}

# NGINX PROXY MANAGER
  nginx-proxy:
    <<: *defaults
    image: jc21/nginx-proxy-manager:2
    container_name: nginx-proxy
    
    ports:
      - "${NGINX_PROXY_MANAGER_PORT1}:80"
      - "${NGINX_PROXY_MANAGER_PORT2}:81"
      - "${NGINX_PROXY_MANAGER_PORT3}:443"

    environment:
      TZ: ${TZ}

    volumes:
      - ./data/nginx-proxy-manager:/data
      - ./data/letsencrypt:/etc/letsencrypt
    
    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${NPM_IP}

# FILEBROWSER
  filebrowser:
    <<: *defaults
    image: filebrowser/filebrowser:v2-amd64-s6
    container_name: filebrowser
    
    ports:
      - ${FILEBROWSER_PORT}:80

    environment:
      PUID: ${FILEBROWSER_PUID}
      PGID: ${FILEBROWSER_PGID}
    
    volumes:
      - /home/${FILEBROWSER_USER}:/srv
      - ./data/filebrowser/database:/database
      - ./data/filebrowser/config:/config

    mem_limit: 512MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${FILEBROWSER_IP}

# GITEA
  gitea:
    <<: *defaults
    image: docker.gitea.com/gitea:1.25.4
    container_name: gitea

    ports:
      - ${GITEA_INTERFACE_PORT}:3000
      - ${GITEA_SSH_PORT}:22

    environment:
      TZ: ${TZ}
      USER_UID: ${GITEA_UID}
      USER_GID: ${GITEA_GID}
      GITEA__database__DB_TYPE: ${GITEA_DATABASE_TYPE}
      GITEA__database__HOST: ${GITEA_DATABASE_HOST}
      GITEA__database__NAME: ${GITEA_DATABASE_NAME}
      GITEA__database__USER: ${GITEA_DATABASE_USER}
      GITEA__database__PASSWD: ${GITEA_DATABASE_PASSWORD}

    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    mem_limit: 412MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${GITEA_IP}

    depends_on:
      - gitea_database

  gitea_database:
    <<: *defaults
    image: postgres:16-alpine
    container_name: gitea_database

    ports:
      - ${GITEA_DATABASE_PORT}:5432

    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${GITEA_DATABASE_NAME}
      POSTGRES_USER: ${GITEA_DATABASE_USER}
      POSTGRES_PASSWORD: ${GITEA_DATABASE_PASSWORD}

    volumes:
      - ./data/gitea_database:/var/lib/postgresql/data

    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${GITEA_DB_IP}

# PIHOLE 
  pihole:
    <<: *defaults
    container_name: pihole
    image: pihole/pihole:2026.02.0

    ports:
      - "${PIHOLE_TCP53_PORT}:53/tcp"
      - "${PIHOLE_UDP53_PORT}:53/udp"
      - "${PIHOLE_TCP80_PORT}:80/tcp"
      - "${PIHOLE_TCP443_PORT}:443/tcp"

    environment:
      TZ: ${TZ}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_listeningMode: ${PIHOLE_FTLCONF_DNS}
      DNSMASQ_LISTENING: ${PIHOLE_DNSMASQ_LISTENING}
      DNSSEC: ${PIHOLE_DNSSEC}
      DNS_FQDN_REQUIRED: ${PIHOLE_DNS_FQDN_REQUIRED}
      DNS_BOGUS_PRIV: ${PIHOLE_DNS_BOGUS_PRIV}
      WEBTHEME: "default-dark"

    volumes:
      - './data/pihole/etc-pihole:/etc/pihole'
      - ./data/pihole/etc-dnsmasq.d:/etc/dnsmasq.d

    mem_limit: 256MB
    cpus: '1.0'

    # networks:
    #   homeserver:
    #     ipv4_address: ${PIHOLE_IP}

    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE

# WG-EASY
